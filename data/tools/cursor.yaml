changelog:
  - date: '2026-05-01'
    type: feature
    summary: 'Security Review Beta（Teams/Enterprise）：两类常驻安全 Agent——Security Reviewer（每次 PR 检查安全漏洞/认证回归/隐私风险/Agent 工具自动批准/提示注入）和 Vulnerability Scanner；Team Marketplace 支持无需关联仓库即可创建，可直接管理一方插件安装行为'
    summary_en: 'Security Review Beta on Teams/Enterprise: two always-on agents — Security Reviewer (checks every PR for security vulnerabilities, auth regressions, privacy/data risks, agent tool auto-approvals, prompt injection) and Vulnerability Scanner; Team Marketplace can now be created without linking a repo, with direct control over first-party plugin install behavior'
  - date: '2026-04-24'
    type: feature
    summary: 'v3.2：/multitask 命令让 Cursor Agent 运行时并行派生异步子 Agent，将大任务拆分为并发子任务，不再串行排队；Agents Window 新版 Worktrees 支持后台隔离任务（独立分支），一键切到本地前台测试；单个 Agent 会话可跨多个 Repo（multi-root workspace）发起变更'
    summary_en: 'v3.2: /multitask spawns async subagents in parallel instead of queueing — breaks large tasks into concurrent chunks; improved Worktrees in Agents Window for background-isolated tasks across separate branches, one-click move to foreground; single agent session can now target multi-root workspaces spanning multiple repos'
  - date: '2026-04-15'
    type: feature
    summary: 'v3.1：Interactive Canvases——Agent 可在 Agents Window 侧面板生成持久化交互式看板（表格/图表/关系图）；CLI 新增 /debug（根因分析+日志注入）、/btw（不打断 Agent 的旁白问题）、/config（交互式设置面板）；Agents Window 支持平铺布局以并行管理多 Agent；语音输入精度提升（批量 STT）'
    summary_en: 'v3.1: Interactive Canvases — agents can create durable interactive dashboards (tables, diagrams, charts) in the Agents Window side panel; CLI adds /debug (root-cause analysis with log injection), /btw (side questions without derailing agent), /config (interactive settings panel); Agents Window tiled layout for parallel agent management; improved voice input accuracy (batch STT)'
  - date: '2026-04-02'
    type: feature
    summary: 'v3.0：全新 Agents Window 支持多 Agent 并行运行（本地/worktree/云端/SSH）；Design Mode 直接在浏览器标注 UI 元素精确指向；/worktree 隔离沙箱命令；/best-of-n 多模型并行跑同一任务再对比；Bugbot 支持 MCP 与自我进化，解决率升至 78%'
    summary_en: 'v3.0: New Agents Window for parallel agents across local/worktree/cloud/SSH; Design Mode annotates browser UI directly; /worktree command for isolated sandboxes; /best-of-n runs the same task in parallel across models; Bugbot with MCP support and self-improvement, 78% resolution rate'
  - date: '2026-03-25'
    type: feature
    summary: '自托管云端 Agent 发布，代码和构建产物全部在用户自有基础设施中运行'
    summary_en: 'Self-Hosted Cloud Agents launched — code, secrets, and build outputs stay entirely in your own infrastructure'
  - date: '2026-03-19'
    type: model
    summary: 'Composer 2 模型上线，前沿编程模型，Standard $0.50/$2.50、Fast $1.50/$7.50 每百万 token'
    summary_en: 'Composer 2 model launched — frontier coding model; Standard $0.50/$2.50, Fast $1.50/$7.50 per M tokens'
  - date: '2026-03-05'
    type: feature
    summary: 'Automations 发布：支持 Slack/Linear/GitHub/PagerDuty/Webhook/定时触发的常驻 Agent，云端沙箱运行'
    summary_en: 'Automations launched — always-on agents triggered by Slack, Linear, GitHub, PagerDuty, webhooks, or schedules; run in cloud sandboxes'
  - date: '2026-03-04'
    type: feature
    summary: 'v2.6: 通过 Agent Client Protocol (ACP) 支持 JetBrains IDE（IntelliJ / PyCharm / WebStorm 等）；MCP Apps 支持 Amplitude/Figma/tldraw 等交互式 UI；Teams/Enterprise 支持私有插件市场'
    summary_en: 'v2.6: JetBrains IDE support via ACP (IntelliJ/PyCharm/WebStorm); MCP Apps with interactive UIs (Amplitude/Figma/tldraw); team plugin marketplaces for Teams/Enterprise'
  - date: '2026-02-24'
    type: feature
    summary: 'v2.5: Cloud Agents 升级，每个 Agent 运行在独立 VM 沙箱中，可自动测试、截图、生成视频，产出含 Artifact 的 Merge-ready PR；可在 Web/桌面/移动/Slack/GitHub 触发'
    summary_en: 'v2.5: Cloud Agents upgraded — each Agent runs in an isolated VM sandbox with auto-test, screenshots, video, Artifact-included Merge-ready PRs; triggerable from Web/desktop/mobile/Slack/GitHub'
  - date: '2026-02-18'
    type: feature
    summary: 'v2.5 CLI: 支持将 Plan 从 CLI 移交给云端 Agent 执行；内联渲染 ASCII 图表；持久化决策菜单'
    summary_en: 'v2.5 CLI: Transfer Plans from CLI to cloud Agent; inline ASCII chart rendering; persistent decision menus'
  - date: '2026-01-22'
    type: feature
    summary: 'v2.4: 引入 Sub-agents 并行处理子任务，改进超长任务上下文管理；Composer 1.5 模型上线，20x RL 提升，更快更智能'
    summary_en: 'v2.4: Sub-agents for parallel subtask processing; improved long-task context; Composer 1.5 model with 20x RL improvement'
  - date: '2026-01-08'
    type: feature
    summary: 'CLI 更新: 新增 models/rules/MCP 命令；Hooks 速度提升 10–20 倍；支持一键 MCP Auth'
    summary_en: 'CLI update: new models/rules/MCP commands; Hooks 10–20x faster; one-click MCP Auth'
  - date: '2026-02-01'
    type: feature
    summary: 长时 Agent（Long-running Agents）发布，先规划再执行，完成以往 Agent 难以胜任的复杂任务，产出更大更完整的 PR
    summary_en: Long-running Agents launched — plan then execute complex tasks, producing larger and more complete PRs
  - date: '2026-01-15'
    type: pricing
    summary: 新增 Pro+ ($60/月) 和 Ultra ($200/月) 套餐
    summary_en: Added Pro+ ($60/mo) and Ultra ($200/mo) tiers
  - date: '2025-06-01'
    type: pricing
    summary: Pro 从500次请求制改为$20额度池制, Auto模式无限使用
    summary_en: Pro switched from 500-request quota to $20 credit pool; unlimited Auto mode
