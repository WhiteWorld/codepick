best_for:
  - 已订阅 ChatGPT Plus/Pro 的用户（无额外成本）
  - 需要并行处理多个独立任务的开发者（多 Agent 同时跑）
  - 编写 PR、修复 Bug、添加测试等明确的异步任务
best_for_en:
  - Users already subscribed to ChatGPT Plus/Pro (no extra cost)
  - Developers who need to run multiple independent tasks in parallel
  - Well-defined async tasks like writing PRs, fixing bugs, adding tests
not_for:
  - Linux 用户（暂不支持）
  - 国内网络用户（OpenAI 被封锁）
  - 需要实时交互逐步确认的工作流
not_for_en:
  - Linux users (not supported yet)
  - Users in China (OpenAI is blocked)
  - Workflows that require real-time interactive step-by-step confirmation
quick_start:
  - 订阅 ChatGPT Plus（$20/月）或 Pro（$200/月），Codex 包含在订阅内
  - 访问 openai.com/codex 下载 macOS 或 Windows 客户端（需 Apple Silicon 或 Windows 设备）
  - 连接 GitHub 仓库（授权 GitHub App），描述编程任务
  - Codex 在云端沙箱中自动执行任务，完成后生成 PR 等待审查
quick_start_en:
  - Subscribe to ChatGPT Plus ($20/mo) or Pro ($200/mo); Codex is included
  - Download the macOS or Windows client from openai.com/codex (requires Apple Silicon or Windows)
  - Connect your GitHub repo (authorize GitHub App), then describe your coding task
  - Codex executes the task in a cloud sandbox and opens a PR for review when done
china_note: 需要翻墙访问，OpenAI 账号在中国大陆受限；国内用户可考虑使用 Kimi Code 或 Claude Code + 方舟替代
china_note_en: Requires VPN; OpenAI accounts are restricted in mainland China; China users may consider Kimi Code or Claude Code + Volcengine Ark as alternatives

