best_for:
  - 想零成本体验顶级模型的开发者
  - 需要超长上下文（100 万 token）处理大型项目
  - 已有 Google 账号、不想配置 API Key 的用户
best_for_en:
  - Developers who want to experience top-tier models at zero cost
  - Users who need ultra-long context (1M tokens) for large projects
  - Anyone with a Google account who doesn't want to configure API Keys
not_for:
  - 国内网络用户（Google 服务被屏蔽）
  - 需要 IDE 内补全体验的用户
  - 需要离线/本地模型的用户
not_for_en:
  - Users in China (Google services are blocked)
  - Users who need in-IDE completion experience
  - Users who need offline/local models
quick_start:
  - 安装 Node.js 18+，运行：npm install -g @google/gemini-cli
  - 在项目目录运行：gemini（首次运行会弹出浏览器引导 Google 账号授权）
  - 授权完成后立即免费使用 Gemini 2.5 Pro，每天 1000 次请求，无需信用卡
  - 重度用户可在 aistudio.google.com 获取 API Key 以突破免费额度限制
quick_start_en:
  - "Install Node.js 18+, run: npm install -g @google/gemini-cli"
  - "Run: gemini in your project directory (first run opens browser for Google account auth)"
  - After auth, use Gemini 2.5 Pro for free immediately — 1000 requests/day, no credit card needed
  - Heavy users can get an API Key at aistudio.google.com to bypass free tier limits
china_note: 需要 Google 账号，中国大陆访问 Google 服务需要代理；无国内镜像；国内用户推荐 Kimi Code 或 Trae CN 作为替代
china_note_en: Requires Google account; accessing Google services from mainland China requires a proxy; no domestic mirror; China users can try Kimi Code or Trae CN as alternatives

