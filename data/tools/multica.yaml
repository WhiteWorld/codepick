  - 仅需单人轻量 AI 编程辅助的场景
  - 不想管理自托管基础设施的用户
not_for_en:
  - Solo lightweight AI coding
  - Users who don't want to manage self-hosted infrastructure

quick_start:
  - 访问 multica.ai 注册 Cloud 版本，或 clone GitHub 仓库自托管
  - 运行 multica setup CLI 工具连接本地机器
  - Multica 自动扫描已安装的 Coding Agent（官方 README 当前列出 12 种命令）
  - 创建 Agent 并配置指令和 Skills
  - 将 Issue 分配给 Agent，实时查看执行进度
quick_start_en:
  - Sign up at multica.ai for Cloud, or clone the GitHub repo for self-hosting
  - Run multica setup CLI to connect your local machine
  - Multica auto-detects installed coding agents (12 commands listed in the current README)
  - Create agents with custom instructions and attach skills
  - Assign issues to agents and watch real-time progress

register_url: https://multica.ai/login
