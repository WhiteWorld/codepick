best_for:
  - 同时使用多种 Agent CLI（Claude / Codex / Gemini / Copilot）的开发者
  - Windows / Linux 用户（Conductor 用不了）
  - 喜欢键盘优先操作、不想离开键盘的用户
  - 想用手机远程查看 Agent 进度（QR 码 + Wi-Fi / Tailscale）
best_for_en:
  - Developers using multiple agent CLIs (Claude / Codex / Gemini / Copilot)
  - Windows / Linux users (Conductor isn't available)
  - Keyboard-first workflow lovers
  - Want to monitor agent progress from phone (QR code + Wi-Fi / Tailscale)

not_for:
  - 需要原生 Linear / GitHub Issue 集成的团队
  - 偏爱托管 SaaS、不想本地装客户端的用户
not_for_en:
  - Teams needing native Linear / GitHub Issue integration
  - Users preferring hosted SaaS over a local client

quick_start:
  - 到 GitHub releases 下载对应平台安装包（Mac / Win / Linux）
  - 启动应用并指向你的本地 git 仓库
  - 选择想要并行的 Agent CLI（已在本机登录的会自动识别）
  - 创建并行任务，每个任务自动建 worktree + 分支
  - 可选：在手机上扫 QR 码远程看进度
quick_start_en:
  - Download the installer for your platform from GitHub releases
  - Launch the app and point it at your local git repo
  - Pick which agent CLIs to parallelize (locally-logged-in ones are auto-detected)
  - Create parallel tasks; each gets its own worktree + branch
  - Optional: scan the QR code on your phone to monitor progress remotely

