  - Teams needing deep Linear / issue tracker integration

quick_start:
  - 到 GitHub releases 下载对应平台安装包（macOS / Linux）
  - 启动 Crystal，导入你的 GitHub repo
  - 在 UI 里点 "New Session" 自动建独立 worktree + 分支
  - 选择 Claude Code 或 Codex 作为该 session 的 runtime
  - 并行开多个 session 处理不同任务，diff 视图统一 review
quick_start_en:
  - Download the installer for your platform (macOS / Linux) from GitHub releases
  - Launch Crystal and import your GitHub repo
  - Click "New Session" in the UI to auto-create an isolated worktree + branch
  - Choose Claude Code or Codex as that session's runtime
  - Run multiple sessions in parallel; review diffs from one place

