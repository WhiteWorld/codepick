  - date: '2026-04-15'
    type: feature
    summary: 'Windsurf 2.0：Devin 云端 Agent 集成进 IDE，一键将本地会话移交 Devin 执行，运行于独立 VM；新增看板式多 Agent 管理视图（Kanban）；Spaces 功能可将 Agent、PR、文件和上下文组织成任务空间；Gemini 3 Flash 向所有用户开放'
    summary_en: 'Windsurf 2.0: Devin Cloud Agent integrated — one-click handoff from local Cascade to Devin running on its own VM; new Kanban view for all local/cloud agent sessions; Spaces to group agents, PRs, files and context into task workspaces; Gemini 3 Flash available to all users'
  - date: '2026-03-19'
    type: pricing
    summary: '定价改革：Pro 从 $15 升至 $20（2026-03-19 前订阅者保留旧价），信用额度制改为每日/每周刷新配额制；新增 Max 套餐 $200/月'
    summary_en: 'Pricing overhaul: Pro raised from $15 to $20 (pre-March-19 subscribers grandfathered at $15); monthly credits replaced by daily/weekly quota system; new Max plan at $200/mo'
  - date: '2026-03-05'
    type: feature
    summary: 'Wave 13: 并行多 Agent 会话，Git worktree 隔离沙箱，双侧 Cascade 面板对比；Arena Mode 上线——在同一 IDE 内对比两个模型输出并投票'
    summary_en: 'Wave 13: parallel multi-agent sessions with Git worktree isolation, side-by-side Cascade panes; Arena Mode — compare two models side-by-side and vote on which performs better'
  - date: '2026-03-05'
    type: model
