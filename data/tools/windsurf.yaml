quick_start:
  - 访问 windsurf.com/download，下载并安装 Windsurf（支持 macOS/Windows/Linux）
  - 注册 Codeium 账号（Free 套餐每月 25 credits，可直接体验），或用 GitHub 登录
  - 打开项目，使用 Cascade 面板（右侧）进行 AI 对话，支持多文件编辑和 Agent 模式
  - JetBrains / Vim 用户：在插件市场搜索 Windsurf 插件，安装后同样支持 Cascade
quick_start_en:
  - Visit windsurf.com/download, download and install Windsurf (macOS/Windows/Linux)
  - "Sign up for a Codeium account (Free plan: 25 credits/month, ready to use) or log in with GitHub"
  - Open your project and use the Cascade panel (right side) for AI chat with multi-file editing and Agent mode
  - "JetBrains/Vim users: search for the Windsurf plugin in the marketplace; Cascade works there too"
register_url: https://windsurf.com
