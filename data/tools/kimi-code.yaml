pricing:
  model: freemium
  currency: CNY
  plans:
    - name: Adagio（免费版）
      price: 0
      limits: 基础对话，Kimi Code 额度有限
      limits_en: Basic conversations, limited Kimi Code quota
    - name: Andante（基础会员）
      price: 49
      period: month
      limits: 更多 Kimi Code 使用额度，适合轻度开发者
      limits_en: More Kimi Code quota, suitable for casual developers
    - name: Moderato（高级会员）
      price: 99
      period: month
      limits: 完整 Kimi Code 额度，适合日常重度开发
      limits_en: Full Kimi Code quota, ideal for daily heavy development
  price_updated_at: '2026-04-16'
  note: 订阅 Kimi 会员即可使用 Kimi Code；Moderato 套餐提供完整编码额度
  note_en: Subscribe to Kimi membership to use Kimi Code; Moderato plan offers full coding quota

scores:
  coding_ability: 8.5
  cost_efficiency: 9.5
  flexibility: 8.0
  china_friendly: 10
  privacy: 4

features:
  code_completion: false
  chat: true
  agent_mode: true
  multi_file_edit: true
  mcp_support: true
  sub_agent: false
  context_window: null
  supported_models:
    - Kimi K2.5
  ide_base: 终端 CLI
  supported_os:
    - macOS
    - Linux
    - Windows
  git_integration: true
  vscode_extension: true
  acp_support: true

best_for:
  - 国内开发者（国产工具，直连无阻）
  - 预算敏感、希望低价使用 Agent 编程
  - 终端党 + VS Code 用户
best_for_en:
  - China-based developers (native tool, no VPN needed)
  - Budget-conscious developers seeking affordable agent coding
  - Terminal users and VS Code fans

not_for:
  - 需要使用自定义第三方模型（仅支持 Kimi 自有模型）
  - JetBrains 重度用户（ACP 支持尚处早期）
  - 追求顶级编码能力的团队
not_for_en:
  - Users who need custom third-party models (only Kimi's own models supported)
  - Heavy JetBrains users (ACP support is still early-stage)
  - Teams demanding top-tier coding performance

quick_start:
  - 安装 Node.js 18+（CLI 用户），运行：npm install -g kimi-code；或打开 VS Code 安装 Kimi Code 插件
  - 访问 kimi.com，用手机号注册 Moonshot AI 账号（支持微信/手机号登录）
  - 在终端运行 kimi-code 登录，或在 VS Code 侧边栏打开 Kimi Code 面板并授权
  - 订阅 Andante（¥49/月）或 Moderato（¥99/月）套餐获取完整编码额度
quick_start_en:
  - "Install Node.js 18+ (for CLI), run: npm install -g kimi-code; or install Kimi Code extension in VS Code"
  - Visit kimi.com and register a Moonshot AI account (WeChat or phone number login supported)
  - Run kimi-code login in terminal, or open the Kimi Code panel in VS Code sidebar and authorize
  - Subscribe to Andante (¥49/mo) or Moderato (¥99/mo) for full coding quota
register_url: https://kimi.ai
china_note: 国产工具，国内直连无需翻墙；支持中文对话；Kimi K2.5 模型专为编程优化，月之暗面自研
china_note_en: Domestic tool, directly accessible in China without VPN; supports Chinese conversation; Kimi K2.5 model optimized for coding, developed by Moonshot AI

