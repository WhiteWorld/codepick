quick_start:
  - 访问 v0.app，用 Vercel 账号（可 GitHub 一键登录）注册，Free 套餐每月 $5 额度
  - 在输入框描述你想要的 UI 组件（如"带搜索的数据表格，使用 shadcn/ui 风格"）
  - AI 生成 React + shadcn/ui 组件代码，可继续对话调整样式和功能
  - 通过 Git 面板创建分支/PR，或直接关联 Vercel 项目一键部署
quick_start_en:
  - "Visit v0.app and sign up with a Vercel account (GitHub one-click login supported); Free plan: $5/month in credits"
  - Describe the UI component you need (e.g. "a data table with search in shadcn/ui style")
  - AI generates React + shadcn/ui component code; keep chatting to refine style and functionality
  - Use the Git panel to create branches/PRs, or link a Vercel project for direct deployment
