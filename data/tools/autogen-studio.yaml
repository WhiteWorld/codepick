  - "pip install -U autogenstudio && autogenstudio ui --port 8080 --appdir ./myapp"
  - "Open http://localhost:8080 in browser"
  - "Create agents and workflows via drag-and-drop Web UI"
  - "Or use Python API (AgentChat) for deeper customization"

