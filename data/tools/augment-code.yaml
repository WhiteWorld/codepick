best_for:
  - 大型/遗留代码库开发者（需要跨文件、跨仓库的深度上下文理解）
  - JetBrains 重度用户（IntelliJ、PyCharm、WebStorm、GoLand）
  - 不想切换 IDE 但想要强 Agent 能力的 VS Code 用户
  - 对数据安全合规要求高的企业团队
best_for_en:
  - Developers on large or legacy codebases who need deep cross-file context understanding
  - Heavy JetBrains users (IntelliJ, PyCharm, WebStorm, GoLand)
  - VS Code users who want strong Agent capabilities without switching editors
  - Enterprise teams with strict data security and compliance requirements

not_for:
  - 预算低于 $20/月的个人开发者（无永久免费方案）
  - 需要离线/本地模型的用户
  - 国内网络用户（无国内节点）
  - 习惯一体化 AI IDE（如 Cursor/Windsurf）的用户
not_for_en:
  - Individual developers on a budget below $20/month (no permanent free tier)
  - Users needing offline or local model support
  - Users in China (no China-based servers, requires VPN)
  - Developers who prefer an all-in-one AI IDE like Cursor or Windsurf

changelog:
  - date: '2026-04-15'
    type: model
    summary: Claude Opus 4.7 上线，2026年4月30日前享50%折扣（约244积分/中等任务）
    summary_en: Claude Opus 4.7 added with 50% launch discount through April 30, 2026 (~244 credits per medium task)
  - date: '2026-02-01'
    type: feature
    summary: Context Engine 开放为 MCP Server，可在 Cursor、Claude Code、Zed 等任意 MCP 客户端中使用 Augment 的代码库语义理解能力
    summary_en: Context Engine released as MCP Server — any MCP-compatible client (Cursor, Claude Code, Zed) can now use Augment's codebase semantic understanding
  - date: '2025-12-01'
    type: feature
    summary: Intent 上线——macOS 独立多 Agent 编排工作台，Coordinator Agent 生成 Living Spec 并分发给并行 Implementor Agent
    summary_en: Intent launched — macOS standalone multi-agent workspace; Coordinator Agent creates a Living Spec and delegates to parallel Implementor Agents
  - date: '2025-10-20'
    type: pricing
    summary: 定价从"按消息数"改为"积分制"：Indie $20/4万积分、Standard $60/13万积分、Max $200/45万积分
    summary_en: Pricing shifted from per-message to credit-based model; Indie $20/40K credits, Standard $60/130K credits, Max $200/450K credits
  - date: '2025-06-01'
    type: feature
    summary: Next Edit 上线——自动检测代码变更的涟漪效应，并在依赖文件中提示联动修改
    summary_en: Next Edit launched — automatically detects ripple effects of code changes and suggests linked edits across dependent files
  - date: '2024-01-01'
    type: launch
    summary: Augment Code 公开发布，主打大型代码库的语义 Context Engine，支持 VS Code 和 JetBrains
    summary_en: Augment Code publicly launched, featuring semantic Context Engine for large codebases, with VS Code and JetBrains support

