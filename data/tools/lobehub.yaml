  - Pure coding scenarios (dedicated coding tools are more efficient)
  - Latency-sensitive real-time tasks

quick_start:
  - "访问 lobehub.com 注册 Cloud 版，或: docker run -d -p 3210:3210 lobehub/lobehub"
  - 配置 LLM API Key（支持 OpenAI / Anthropic / Gemini 等）
  - 在 Agent Builder 中创建 Agent 或从 Marketplace 发现
  - 创建 Agent Group 组队协作
quick_start_en:
  - "Sign up at lobehub.com for Cloud, or: docker run -d -p 3210:3210 lobehub/lobehub"
  - "Configure LLM API keys (OpenAI / Anthropic / Gemini etc.)"
  - "Create agents in Agent Builder or discover from Marketplace"
  - "Create Agent Groups for team collaboration"

