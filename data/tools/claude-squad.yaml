  - Users wanting a visual dashboard and graphical PR review

quick_start:
  - "安装：brew install claude-squad（或参考 README 用 go install）"
  - "命令：cs（进入主界面，按 n 新建 instance）"
  - 每个 instance 自动建独立 worktree + 分支
  - 可以同时启动多个不同 runtime（Claude Code / Codex / Aider 等）
  - 用 tmux 快捷键在 instance 间切换
quick_start_en:
  - "Install: brew install claude-squad (or use go install per README)"
  - "Run: cs (enters main UI, press n to create a new instance)"
  - Each instance auto-creates its own worktree + branch
  - Launch multiple runtimes side by side (Claude Code / Codex / Aider, etc.)
  - Switch between instances via tmux keybindings

