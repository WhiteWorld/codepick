best_for:
  - 已重度使用 Claude Code / Codex，想突破单 Agent 串行瓶颈的 Mac 开发者
  - Issue / Feature 驱动的工作流（尤其 Linear 用户）
  - 愿意多花点 token 换时间的独立开发者
best_for_en:
  - Heavy Claude Code / Codex users on Mac who want to escape the single-agent serial bottleneck
  - Issue- or feature-driven workflows (especially Linear users)
  - Solo developers willing to spend more tokens to save time

not_for:
  - Windows / Linux 用户（目前 Mac only）
  - 代码托管在 GitLab / Bitbucket / 自建 Git 的团队（仅支持 GitHub）
  - 刚接触 AI 编程工具的新手（先把单 Agent 玩熟）
  - 预算紧、对 token 消耗敏感的用户（并行很烧）
not_for_en:
  - Windows / Linux users (Mac only today)
  - Teams hosting code on GitLab / Bitbucket / self-hosted git (GitHub only)
  - Beginners new to AI coding tools (master single-agent first)
  - Token-sensitive users on a tight budget (parallel runs burn quota fast)

quick_start:
  - 在 conductor.build 下载 Mac 应用
  - 确认本机已登录 Claude Code 或 Codex
  - 打开 GitHub repo，点击 "New Workspace" 自动建分支 + worktree
  - 在 workspace 内启动 Agent 并描述任务
  - 同时开 2-3 个 workspace 做不同 feature，仪表盘统一查看
  - 完成后在 Conductor 内 review diff、发 PR、合并
quick_start_en:
  - Download the Mac app at conductor.build
  - Confirm Claude Code or Codex is already logged in locally
  - Open your GitHub repo and click "New Workspace" — it auto-creates a branch + worktree
  - Launch an agent inside the workspace and describe the task
  - Open 2–3 parallel workspaces for different features; monitor from one dashboard
  - When done, review diff, open PR, and merge — all inside Conductor

register_url: https://www.conductor.build
