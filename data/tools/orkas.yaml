quick_start:
  - git clone https://github.com/Orkas-AI/Orkas && cd Orkas && ./run.sh
  - 首次启动自动安装依赖和嵌入模型（~95MB）
  - 在 Settings → AI Providers 配置 API Key
  - 通过对话创建 Agent 团队，Commander 自动调度
quick_start_en:
  - "git clone https://github.com/Orkas-AI/Orkas && cd Orkas && ./run.sh"
  - "First launch auto-installs dependencies and embedding model (~95MB)"
  - "Configure API keys in Settings → AI Providers"
  - "Create agent teams through conversation, Commander auto-dispatches"

