- id: refactor-java
  title: "Java 代码现代化重构"
  title_en: "Java Code Modernization"
  category: java
  scenario: refactor
  template_zh: |
    请重构以下 Java 代码，使其更现代化、可维护：

    ```java
    {粘贴需要重构的代码}
    ```

    **重构方向（选择）：**
    - [ ] 提取方法/类，降低复杂度
    - [ ] 使用 Stream API 替代循环
    - [ ] 应用 Optional 避免空指针
    - [ ] 使用 Record / 密封类等 Java 新特性
    - [ ] 应用设计模式：{填写，如 Builder / Strategy}

    **目标 Java 版本：** {填写，如 Java 17+}

    请提供重构后的代码，并解释主要改进点。
  template_en: |
    Please refactor the following Java code to make it more modern and maintainable:

    ```java
    {paste the code to refactor}
    ```

    **Refactoring direction (choose):**
    - [ ] Extract methods/classes to reduce complexity
    - [ ] Replace loops with Stream API
    - [ ] Use Optional to avoid NullPointerException
    - [ ] Use Record / sealed classes and other modern Java features
    - [ ] Apply design pattern: {specify, e.g. Builder / Strategy}

    **Target Java version:** {specify, e.g. Java 17+}

    Please provide the refactored code and explain the key improvements.

- id: test-java
  title: "Java 单元测试（JUnit 5）"
  title_en: "Java Unit Tests (JUnit 5)"
  category: java
  scenario: test
  template_zh: |
    请用 JUnit 5 为以下 Java 代码编写单元测试：

    ```java
    {粘贴需要测试的类或方法}
    ```

    **测试框架：** JUnit 5 + Mockito（用于 mock 外部依赖）

    **请覆盖：**
    1. 主要业务逻辑的正常路径（happy path）
    2. 边界条件和输入验证
    3. 异常情况（抛出 Exception 的场景）
    4. 对外部依赖（Service、Repository、HTTP 客户端等）使用 `@Mock` 处理
  template_en: |
    Please write JUnit 5 unit tests for the following Java code:

    ```java
    {paste the class or methods to test}
    ```

    **Framework:** JUnit 5 + Mockito (for mocking external dependencies)

    **Please cover:**
    1. Happy path for core business logic
    2. Boundary conditions and input validation
    3. Exception scenarios (cases that should throw exceptions)
    4. Use `@Mock` for external dependencies (Services, Repositories, HTTP clients, etc.)

