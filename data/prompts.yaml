    - [ ] Improve security (avoid hardcoded secrets, least privilege, etc.)
    - [ ] Reduce Docker image size
    - [ ] Speed up CI/CD pipeline
    - [ ] Improve readability (comments, variable naming, etc.)

    Please provide the optimized version and explain the key changes.

- id: test-devops
  title: "CI/CD 流水线设计"
  title_en: "CI/CD Pipeline Design"
  category: devops
  scenario: test
  template_zh: |
    请帮我为以下项目设计 CI/CD 流水线配置：

    **项目信息：**
    - 语言/框架：{如 Python/FastAPI / Node.js/React / Java/Spring Boot / Go}
    - 代码托管平台：{GitHub / GitLab / Gitee}
    - 部署目标：{如 Docker + Kubernetes / Vercel / 阿里云 ECS / AWS EC2}

    **流水线需要包含：**
    1. 代码检查（Lint）和格式化验证
    2. 单元测试，并生成覆盖率报告
    3. 构建 Docker 镜像并推送到镜像仓库
    4. 自动部署到测试环境（merge 到 develop 触发）
    5. 手动确认后部署到生产（merge 到 main 触发）

    请生成完整的 GitHub Actions（或 GitLab CI）配置文件。
  template_en: |
    Please help me design a CI/CD pipeline configuration for this project:

    **Project info:**
    - Language/framework: {e.g. Python/FastAPI / Node.js/React / Java/Spring Boot / Go}
    - Code hosting: {GitHub / GitLab}
    - Deployment target: {e.g. Docker + Kubernetes / Vercel / AWS EC2}

    **Pipeline should include:**
    1. Linting and format validation
    2. Unit tests with coverage report
    3. Build Docker image and push to container registry
    4. Auto-deploy to staging (triggered on merge to develop)
    5. Manual approval for production deployment (triggered on merge to main)

    Please generate a complete GitHub Actions (or GitLab CI) config file.

