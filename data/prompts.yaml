- id: test-frontend
  title: "前端组件测试"
  title_en: "Frontend Component Tests"
  category: frontend
  scenario: test
  template_zh: |
    请为以下前端组件编写测试：

    ```tsx
    {粘贴需要测试的组件}
    ```

    **测试框架：** Vitest + React Testing Library（如使用 Vue/其他请注明）

    **请覆盖：**
    1. 组件正常渲染（快照测试或结构验证）
    2. 用户交互（点击、输入、表单提交）
    3. 异步数据加载状态（loading / 成功 / 错误）
    4. 边界情况（空数据、null props）

    如有网络请求，请用 `vi.mock` 或 `msw` 拦截。
  template_en: |
    Please write tests for the following frontend component:

    ```tsx
    {paste the component to test}
    ```

    **Testing framework:** Vitest + React Testing Library (specify if using Vue or another framework)

    **Please cover:**
    1. Component renders correctly (snapshot or structural verification)
    2. User interactions (click, input, form submission)
    3. Async data loading states (loading / success / error)
    4. Edge cases (empty data, null props)

    For network requests, intercept with `vi.mock` or `msw`.

