# AI 编程提示词模板库
# category: python | java | frontend | devops
# scenario: debug | refactor | test | explain

- id: debug-python
  title: "Python 报错调试"
  title_en: "Python Error Debug"
  category: python
  scenario: debug
  template_zh: |
    我在运行以下 Python 代码时遇到了报错：

    **报错信息：**
    ```
    {粘贴完整报错 Traceback}
    ```

    **相关代码：**
    ```python
    {粘贴出错的代码片段}
    ```

    **我已尝试过：**
    {描述已经尝试过的排查方向，没有可填"无"}

    请帮我：
    1. 分析报错的根本原因
    2. 提供修复后的代码
    3. 解释如何避免这类问题
  template_en: |
    I'm getting an error when running this Python code:

    **Error message:**
    ```
    {paste full error Traceback}
    ```

    **Relevant code:**
    ```python
    {paste the code causing the error}
    ```

    **What I've tried:**
    {describe what you've already attempted, or write "nothing yet"}

    Please:
    1. Explain the root cause of this error
    2. Provide a fixed version of the code
    3. Explain how to avoid this type of issue in the future

- id: refactor-python
  title: "Python 代码重构"
  title_en: "Python Code Refactor"
  category: python
  scenario: refactor
  template_zh: |
    请帮我重构以下 Python 代码：

    ```python
    {粘贴需要重构的代码}
    ```

    **重构目标（选择或填写）：**
    - [ ] 提高可读性
    - [ ] 减少重复代码（DRY）
    - [ ] 提升性能
    - [ ] 符合 PEP8 规范
    - [ ] 其他：{填写}

    **约束条件：**
    - 保持对外接口不变（相同的函数签名和返回值）
    - Python 版本：{填写，如 3.10+}

    请提供重构后的代码，并列出主要改动点。
  template_en: |
    Please refactor the following Python code:

    ```python
    {paste the code to refactor}
    ```

    **Refactoring goals (choose or fill in):**
    - [ ] Improve readability
    - [ ] Reduce duplication (DRY)
    - [ ] Improve performance
    - [ ] PEP8 compliance
    - [ ] Other: {specify}

    **Constraints:**
    - Keep the same external interface (same function signatures and return values)
    - Python version: {specify, e.g. 3.10+}

    Please provide the refactored code and list the key changes.

- id: test-python
  title: "Python 单元测试"
  title_en: "Python Unit Tests"
  category: python
  scenario: test
  template_zh: |
    请为以下 Python 代码编写单元测试：

    ```python
    {粘贴需要测试的函数或类}
    ```

    **测试框架：** pytest（如需其他框架请注明）

    **请覆盖以下场景：**
    1. 正常输入的预期行为
    2. 边界条件（空列表、零值、最大值等）
    3. 异常和错误场景（应该抛出什么异常）

    如果代码有外部依赖（数据库、HTTP 请求、文件系统等），请使用 `unittest.mock.patch` 或 `pytest-mock` 处理。
  template_en: |
    Please write unit tests for the following Python code:

    ```python
    {paste the function or class to test}
    ```

    **Testing framework:** pytest (specify if you need a different framework)

    **Please cover these scenarios:**
    1. Expected behavior with normal inputs
    2. Edge cases (empty list, zero value, max value, etc.)
    3. Exception and error scenarios (what exceptions should be raised)

    For external dependencies (database, HTTP requests, filesystem, etc.), please use `unittest.mock.patch` or `pytest-mock`.

- id: explain-python
  title: "Python 代码解释"
  title_en: "Python Code Explanation"
  category: python
  scenario: explain
  template_zh: |
    请解释以下 Python 代码的作用：

    ```python
    {粘贴需要解释的代码}
    ```

    **我的背景：** {填写，例如：Python 初学者 / 熟悉 Python 但不了解这个库}

    请说明：
    1. 这段代码整体做了什么
    2. 每个关键步骤的作用
    3. 用到了哪些 Python 特性或设计模式
    4. 有无潜在的性能问题或注意事项
  template_en: |
    Please explain what the following Python code does:

    ```python
    {paste the code to explain}
    ```

    **My background:** {specify, e.g.: Python beginner / familiar with Python but not this library}

    Please cover:
    1. What the code does overall
    2. What each key step does
    3. Which Python features or design patterns are used
    4. Any potential performance issues or gotchas

