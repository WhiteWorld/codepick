description: "国内开发者的首选方案。Trae IDE 免费版可用，搭配方舟 Coding Plan 可获得更多模型与额度。新用户订阅入口自 2026-03-13 起改为每日 10:30 限量开放，支持 Doubao-Seed-Code 等国产模型，国内直连零延迟。Builder/SOLO 模式体验流畅。"
description_en: "A go-to setup for China developers. The free Trae IDE can be paired with Ark Coding Plan for more models and quota. Since March 13, 2026, new-user subscriptions open in limited quantities each day at 10:30, with domestic models like Doubao-Seed-Code and zero-latency direct China access. Smooth Builder/SOLO mode experience."
