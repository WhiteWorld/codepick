quick_start:
  - "安装 Claude Code CLI（npm i -g @anthropic-ai/claude-code）"
  - "访问方舟 Agent Plan 活动页订阅（每天 00:00 释放库存）"
  - "在火山引擎控制台创建 API Key"
  - "用 ANTHROPIC_BASE_URL 指向方舟 Agent 端点 + ANTHROPIC_API_KEY 配置 Key"
  - "运行 claude，按 AFP 估算挑选模型与上下文长度"
quick_start_en:
  - "Install Claude Code CLI (npm i -g @anthropic-ai/claude-code)"
  - "Subscribe via the Ark Agent Plan page (daily 00:00 inventory release)"
  - "Create an API key in the Volcano Engine console"
  - "Point ANTHROPIC_BASE_URL to the Ark Agent endpoint and set ANTHROPIC_API_KEY"
  - "Run claude and size prompts to your AFP budget and context length"

pros:
  - 一份订阅同时拿到编程 + 图像/视频 + 联网搜索 + 记忆
  - 国内直连，无需代理
  - Anthropic 协议原生兼容，Claude Code 配置最简单
  - Medium 档起赠送 7×24 在线智能伙伴
pros_en:
  - One subscription covers coding + image/video + web search + memory
  - China-native, no proxy needed
  - Native Anthropic protocol support — easiest to wire into Claude Code
  - Medium tier and above include a 24/7 AI companion

cons:
  - Token 单价相比 Coding Plan 涨 2~2.5×
  - 长上下文（>128k）触发 7.5× 倍率，AFP 消耗极快
  - 库存每天 00:00 释放售完即止，热门档位需要抢
  - 模型仍是 Doubao 系，并非 Claude Opus 原版
cons_en:
  - Token unit price is 2~2.5× higher than the legacy Coding Plan
  - Long context (>128k) triggers a 7.5× multiplier — AFP burns fast
  - Daily 00:00 inventory release, popular tiers sell out
  - Models are still Doubao-family, not original Claude Opus

setup_difficulty: 中等
