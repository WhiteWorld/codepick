  - "Install Cline from VS Code extension marketplace"
  - "Register an Alibaba Cloud account and activate Bailian Coding Plan Pro (check official pricing)"
  - "Configure Bailian API Key and Base URL in Cline settings"
  - "Choose a model (qwen3.5-plus or qwen3-coder-next recommended)"

pros:
  - Cline 免费开源，千问生态接入顺滑
  - 支持8款编程模型自由切换，含千问最新模型
  - 国内直连，无需代理
  - Plan/Act 双模式，Agent 能力强
pros_en:
  - Cline is free and open-source with smooth Qwen ecosystem access
  - Freely switch between 8 coding models including latest Qwen
  - Direct China access, no proxy needed
  - Plan/Act dual mode with strong Agent capabilities
cons:
  - 当前新购门槛提高，仅开放 Pro
  - 模型能力与 Claude Opus 有差距
  - 需要手动配置 API
  - 额度用完不自动转按量计费
cons_en:
  - New-purchase entry cost is higher with Pro-only availability
  - Model capability gap vs Claude Opus
  - Manual API configuration required
  - No automatic pay-per-use fallback when quota runs out
