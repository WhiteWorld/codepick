pros:
  - 开源免费客户端，接入千问生态顺滑
  - 支持8款编程模型自由切换
  - 国内直连，无需代理
  - 多会话管理
pros_en:
  - Free open-source client with smooth access to the Qwen ecosystem
  - Freely switch between 8 coding models
  - Direct China access, no proxy needed
  - Multi-session management
cons:
  - 当前新购门槛提高，仅开放 Pro
  - 终端交互，学习曲线略高
  - 模型能力不如 Claude Code 原生
  - 额度用完不自动转按量计费
cons_en:
  - New-purchase entry cost is higher with Pro-only availability
  - Terminal-based, slightly steeper learning curve
  - Model capability below native Claude Code
  - No automatic pay-per-use fallback when quota runs out
