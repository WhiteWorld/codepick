  - "Configure Ark API Key and Base URL in Cline settings"
  - "Choose a model (Doubao-Seed-Code or Auto mode recommended)"

pros:
  - Cline 免费开源，搭配方舟活动价门槛较低
  - 支持多款国产编程模型自由切换
  - 国内直连，无需代理
  - Plan/Act 双模式，Agent 能力强
pros_en:
  - Cline is free and open-source, with a relatively low entry point when Ark promotions are available
  - Freely switch between multiple domestic coding models
  - Direct China access, no proxy needed
  - Plan/Act dual mode with strong Agent capabilities
cons:
  - 模型能力与 Claude Opus 有差距
  - 需要手动配置 API
  - 新用户订阅需要卡每日 10:30 开放时间
  - Cline 社区版更新节奏不如商业产品
cons_en:
  - Model capability gap vs Claude Opus
  - Manual API configuration required
  - New-user subscriptions require catching the daily 10:30 opening window
  - Cline community edition updates slower than commercial products
