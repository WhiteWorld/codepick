description: "终端党的国产平替方案。开源 CLI 客户端，支持 75+ 模型提供商、多会话管理，接方舟 API 国内直连。方舟提供 Lite / Pro 双层级套餐；新用户订阅入口自 2026-03-13 起改为每日 10:30 限量开放。"
description_en: "A domestic alternative for terminal enthusiasts. Open-source CLI client supporting 75+ model providers and multi-session management, with Volcengine Ark API for direct China access. Ark offers Lite and Pro tiers; since March 13, 2026, new-user subscriptions open in limited quantities each day at 10:30."

