best_for:
  - 终端重度用户
  - 预算有限的国内开发者
  - 想要 Claude Code 体验但用国产模型
best_for_en:
  - Terminal power users
  - Budget-conscious developers in China
  - Claude Code experience with domestic models

quick_start:
  - "安装 OpenCode CLI"
  - "注册火山方舟账号，在每日 10:30 开放时订阅 Coding Plan"
  - "配置方舟 API Key 和 Base URL"
  - "选择模型（推荐 Auto 模式）"
quick_start_en:
  - "Install OpenCode CLI"
  - "Register a Volcengine Ark account and subscribe to Coding Plan during the daily 10:30 opening window"
  - "Configure Ark API Key and Base URL"
  - "Choose a model (Auto mode recommended)"

pros:
  - 开源免费客户端 + 方舟活动价门槛较低
  - 支持75+模型提供商
  - 多会话管理
  - 国内直连，无需代理
pros_en:
  - Free open-source client with a relatively low entry point when Ark promotions are available
  - Supports 75+ model providers
  - Multi-session management
  - Direct China access, no proxy needed
cons:
  - 终端交互，学习曲线略高
  - 模型能力不如 Claude Code 原生
  - 新用户订阅需要卡每日 10:30 开放时间
  - 社区较小，文档不够完善
cons_en:
  - Terminal-based, slightly steeper learning curve
  - Model capability below native Claude Code
  - New-user subscriptions require catching the daily 10:30 opening window
  - Small community, documentation needs improvement
