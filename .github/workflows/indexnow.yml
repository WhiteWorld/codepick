name: Submit IndexNow

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'src/content/**'
      - 'src/pages/**'
      - 'src/page-views/**'
      - 'src/lib/**'
      - 'astro.config.mjs'
  workflow_dispatch:

concurrency:
  group: indexnow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Submit URLs to IndexNow
        run: npm run submit-indexnow
