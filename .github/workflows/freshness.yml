name: Content Quality Check

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  content-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check content quality
        id: content
        run: npm run content:check -- --strict
        continue-on-error: true

      - name: Create issue if content check fails
        if: steps.content.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const output = execSync('node scripts/check-content.mjs --strict --json 2>&1 || true').toString();
            
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'content-quality'
            });
            
            const body = `## CodePick content quality check failed\n\n\`\`\`json\n${output}\n\`\`\`\n\n*Generated at ${new Date().toISOString()}*`;

            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                title: 'CodePick content quality check failed',
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'CodePick content quality check failed',
                body,
                labels: ['content-quality']
              });
            }
